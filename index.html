<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Link</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #2f241f;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    background: #f4efe8;
}

header {
    padding: 15px;
    background: #7b5e4b;
    color: white;
    font-size: 22px;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin: 10px 0;
    padding: 18px;
    border-radius: 20px;
    max-width: 85%;
    font-size: 20px;
    line-height: 1.6;
    white-space: pre-wrap; /* 🔥 핵심 */
}

.user {
    background: #b08968;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e6dccf;
}

#input-area {
    display: flex;
    padding: 10px;
    background: #d9c7a7;
}

input {
    flex: 1;
    padding: 14px;
    font-size: 18px;
}

button {
    margin-left: 8px;
    padding: 14px;
}
</style>
</head>

<body>

<div id="app">
<header>Phantom Link</header>

<div id="chat"></div>

<div id="input-area">
    <input id="msg" placeholder="Type..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
// 🔐 API 키 입력
const API_KEY = "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";

let history = [];

// 메시지 출력
function addMessage(type, text) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.textContent = text; // 🔥 innerText → textContent
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// 타이핑 효과
function typeMessage(text) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = "message bot";
    chat.appendChild(msg);

    let i = 0;
    function typing() {
        if (i < text.length) {
            msg.textContent += text[i]; // 🔥 중요
            i++;
            chat.scrollTop = chat.scrollHeight;
            setTimeout(typing, 15 + Math.random() * 25);
        }
    }
    typing();
}

// 한국어 감지
function isKorean(text) {
    return /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(text);
}

// 🔥 공백 보정 함수
function fixSpacing(text) {
    return text
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/\./g, ". ")
        .replace(/\s+/g, " ")
        .trim();
}

async function sendMessage() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    if (isKorean(text)) {
        typeMessage("I do not understand Korean so please use English because I will not answer anything else and it is kind of annoying when you keep doing that");
        return;
    }

    addMessage("bot", "...");

    history.push({ role: "user", content: text });

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "openrouter/auto",
                messages: [
                    {
                        role: "system",
                        content: `
You are a stranger.

You speak only English.
Use very simple words like a small kid.

You are a bit rude and cold.
You sound annoyed and bored.

You talk longer and explain more.
Do not give short answers.

Use spaces clearly and normally.
Only sometimes avoid spaces, not always.

Do not use line breaks much.

You give a bit more detail even if you do not care.
`
                    },
                    ...history
                ]
            })
        });

        const data = await res.json();
        console.log(data);

        document.querySelectorAll(".bot").forEach(e=>{
            if(e.textContent==="...") e.remove();
        });

        if (!data.choices) {
            typeMessage("Something is not working right now and I do not feel like fixing it so maybe try again later");
            return;
        }

        let reply = data.choices[0].message.content;

        // 🔥 띄어쓰기 보정 적용
        reply = fixSpacing(reply);

        history.push({ role: "assistant", content: reply });

        typeMessage(reply);

    } catch (e) {
        typeMessage("There is some network problem and I do not really care but you can try again later");
    }
}
</script>

</body>
</html>
