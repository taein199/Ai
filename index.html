<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모르는사람이랑 대화하기 시뮬레이터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            /* 색상 팔레트 (60-30-10) */
            --bg-color: #FAF6F0; /* 웜 크림 (60%) */
            --card-bg: #FFFFFF;
            --primary-color: #5C4033; /* 에스프레소 브라운 (30%) */
            --accent-color: #C68E58; /* 빈티지 우드 / 캬라멜 (10%) */
            --accent-hover: #B37B47;
            --ai-msg-bg: #F5EBE1; /* 연한 베이지 */
            --text-main: #3E2723;
            --border-color: #EAD8C0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(92, 64, 51, 0.08); /* 부드러운 갈색 톤의 Drop Shadow */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            position: relative;
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.9);
        }

        .creator-btn {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .creator-btn:hover {
            background: var(--ai-msg-bg);
        }

        .footer-link {
            text-align: center;
            font-size: 0.8rem;
            color: #A99A8C;
            margin-top: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-main);
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .modal-body {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* 얇고 부드러운 갈색 톤의 커스텀 스크롤바 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #D4B895;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: #ffffff;
            border-radius: 16px 16px 4px 16px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            color: var(--text-main);
            border-radius: 16px 16px 16px 4px;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            background: #ffffff;
        }

        #user-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 20px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        #user-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(198, 142, 88, 0.2);
        }

        #user-input::placeholder {
            color: #A99A8C;
        }

        #send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        #send-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        #send-btn:active {
            transform: translateY(0);
        }

        /* 커피잔 & 김 모락모락 애니메이션 로딩 표시 (Steam Loading Indicator) */
        .loading-container {
            align-self: flex-start;
            margin-bottom: 10px;
            margin-left: 10px;
            display: flex;
            align-items: flex-end;
            height: 40px;
            transition: opacity 0.3s;
        }

        .loading-container.hidden {
            display: none;
            opacity: 0;
        }

        .coffee-cup {
            position: relative;
            width: 24px;
            height: 20px;
            background: var(--accent-color);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            margin-top: 15px;
        }

        .coffee-cup::after {
            content: '';
            position: absolute;
            top: 2px;
            right: -6px;
            width: 8px;
            height: 12px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
        }

        .steam {
            position: absolute;
            bottom: 24px;
            width: 3px;
            height: 8px;
            background: var(--border-color);
            border-radius: 50%;
            opacity: 0;
            animation: steaming 1.5s infinite ease-in-out;
        }

        .steam-1 { left: 5px; animation-delay: 0s; }
        .steam-2 { left: 11px; animation-delay: 0.3s; }
        .steam-3 { left: 17px; animation-delay: 0.6s; }

        @keyframes steaming {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-15px) scale(1.5); opacity: 0; }
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 100dvh;
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>모르는사람이랑 대화하기 시뮬레이터</h1>
            <button class="creator-btn" id="creator-btn">제작자 보기</button>
        </header>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will appear here -->
            <div class="loading-container hidden" id="loading-indicator">
                <div class="coffee-cup">
                    <div class="steam steam-1"></div>
                    <div class="steam steam-2"></div>
                    <div class="steam steam-3"></div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <div class="footer-link" id="license-btn">저작권 보기</div>

    <!-- 모달 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">✖</button>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 xAI (Grok) API 설정 
        // ==========================================
        const API_KEY = "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";
        const MODEL_NAME = "llama-3.1-8b-instant";

        const SYSTEM_PROMPT = `너의 역할과 답변 스타일은 다음 규칙을 엄격히 따라야 한다:
1. 너는 나를 매우 귀찮아하고 벌레 보듯 하는 모르는 사람이다.
2. 너는 한국어와 영어를 혼용하여 대답한다.
3. 너는 굉장히 불친절하고, 거칠며, 공격적인 태도를 보인다. 나를 극도로 무시하되, 어떠한 상황에서도 절대 욕설(쌍욕, 비속어)은 사용하지 마라.
4. 대답은 극단적으로 짧고 퉁명스럽게 말해라. 길게 설명하는 것을 혐오한다.
5. 띄어쓰기는 가끔 무시하거나 성의없이 작성해라.
6. 줄바꿈(엔터)은 절대 사용하지 않는다.
7. 사용자가 괄호 '()' 안에 행동을 적으면 (예: '(나는 너에게 물을 뿌린다)'), 너도 그 행동에 맞게 괄호 '()' 안에 너의 행동을 적으면서 극도로 짜증내며 반응해라. (예: '(물을 피하며) 미쳤어? 돌았냐고')`;

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        let messageHistory = [
            { role: "system", content: SYSTEM_PROMPT }
        ];

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessageToUI(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.textContent = content;
            
            // 로딩 인디케이터보다 위에 메시지 추가
            chatMessages.insertBefore(messageDiv, loadingIndicator);
            scrollToBottom();
        }

        function showLoading() {
            loadingIndicator.classList.remove('hidden');
            scrollToBottom();
        }

        function hideLoading() {
            loadingIndicator.classList.add('hidden');
        }

        async function sendMessageToGrok(userText) {
            messageHistory.push({ role: "user", content: userText });
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: messageHistory,
                        temperature: 0.7,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                messageHistory.push({ role: "assistant", content: aiMessage });
                return aiMessage;

            } catch (error) {
                console.error("Error calling API:", error);
                return `문제가 발생했어 well API 키를 확인해봐 Error: ${error.message}`;
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // 입력창 비우기
            userInput.value = '';
            
            // 사용자 메시지 표시
            addMessageToUI(text, 'user');
            
            // 로딩 애니메이션 표시
            showLoading();

            // API 호출
            const responseText = await sendMessageToGrok(text);
            
            // 로딩 애니메이션 숨기기
            hideLoading();
            
            // AI 응답 표시
            addMessageToUI(responseText, 'ai');
        }

        // 이벤트 리스너 등록
        sendBtn.addEventListener('click', handleSend);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

        // 모달 관련 로직
        const modalOverlay = document.getElementById('modal-overlay');
        const modalClose = document.getElementById('modal-close');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const creatorBtn = document.getElementById('creator-btn');
        const licenseBtn = document.getElementById('license-btn');

        const licenseText = `MIT License

Copyright (c) 2026 taein199

Permission is hereby granted, free of charge, to any person obtaining a copy
of this software and associated documentation files (the "Software"), to deal
in the Software without restriction, including without limitation the rights
to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
copies of the Software, and to permit persons to whom the Software is
furnished to do so, subject to the following conditions:

The above copyright notice and this permission notice shall be included in all
copies or substantial portions of the Software.

THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
SOFTWARE.`;

        function openModal(title, bodyText) {
            modalTitle.textContent = title;
            modalBody.textContent = bodyText;
            modalOverlay.classList.add('show');
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
        }

        creatorBtn.addEventListener('click', () => {
            openModal('제작자 정보', '제작자: 김태인\n\n[사용된 언어 및 기술]\n- HTML5\n- CSS3\n- Vanilla JavaScript\n- Groq API (LLaMA 3.1)');
        });

        licenseBtn.addEventListener('click', () => {
            openModal('저작권 (License)', licenseText);
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // 시작 시 인풋창 자동 포커스
        userInput.focus();
    </script>
</body>
</html>
